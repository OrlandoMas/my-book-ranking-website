<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Ranking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Personal Book Ranking</h1>
    </header>

    <main>
        <div id="loading-indicator" style="text-align: center; margin: 20px;">
            <p>Loading your library...</p>
        </div>

        <section id="ranking-interface">
            <div class="book-comparison-container">
                <div id="book-1" class="book-card">
                    <img class="book-cover" src="" alt="Book Cover">
                    <h2 class="book-title"></h2>
                    <p class="book-author"></p>
                    <button class="prefer-button">I Prefer This</button>
                </div>

                <div id="book-2" class="book-card">
                    <img class="book-cover" src="" alt="Book Cover">
                    <h2 class="book-title"></h2>
                    <p class="book-author"></p>
                    <button class="prefer-button">I Prefer This</button>
                </div>
            </div>
        </section>

        <section id="ranked-list-section">
            <h2>Top 10 Ranked Books</h2>
            <ul id="ranked-book-list">
                <li>Start ranking to see your top books!</li>
            </ul>
            <div style="margin-top: 30px;">
                <button id="reset-rankings-button" style="background-color: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Reset All Progress</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
